<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><title>Life finds a Way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#000;color:#fff;font-family:sans-serif;}input,textarea{background:#111;border:1px solid #333;color:#fff;padding:12px;width:100%;}</style>
</head>
<body class="p-6">
    <div id="setup" class="max-w-md mx-auto space-y-6">
        <h1 class="text-3xl text-center italic">Life finds a Way</h1>
        <input type="password" id="apiKey" placeholder="Incolla API Key">
        <button onclick="start()" class="w-full bg-white text-black font-bold py-4 uppercase">Inizia</button>
    </div>
    <div id="game" class="hidden fixed inset-0 flex flex-col bg-black p-6">
        <div id="log" class="flex-1 overflow-y-auto space-y-6"></div>
        <textarea id="action" class="mt-4" placeholder="Cosa fai?"></textarea>
        <button onclick="turn()" class="bg-white text-black p-4 mt-2 font-bold">ESEGUI</button>
    </div>
    <script>
        async function start() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            turn();
        }
        async function turn() {
            const key = document.getElementById('apiKey').value.trim();
            const log = document.getElementById('log');
            const action = document.getElementById('action').value || "Inizia la mia storia.";
            const loading = document.createElement('p');
            loading.innerText = "Scrivendo...";
            log.appendChild(loading);

            // URL STABILE V1 (NON BETA)
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({contents: [{parts: [{text: action + " (Rispondi in italiano narrativo storico)"}]}]})
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error.message);
                loading.remove();
                log.innerHTML += `<div class='border-l p-4 mb-4'>${data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>')}</div>`;
                document.getElementById('action').value = "";
                log.scrollTop = log.scrollHeight;
            } catch(e) {
                loading.innerText = "ERRORE: " + e.message;
            }
        }
    </script>
</body>
</html>
