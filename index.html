<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life finds a Way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f1ea; --text: #1a1a1a; --accent: #5d2e0a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .serif { font-family: 'Crimson Pro', serif; }
        .card { background: #fff; border: 1px solid #d1ccc0; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .btn-main { background: var(--accent); color: #fff; font-weight: bold; padding: 14px; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; border-radius: 6px; transition: all 0.3s ease; cursor: pointer; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(93, 46, 10, 0.3); }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.8s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-btn { animation: pulseBtn 2.5s infinite; }
        @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(93, 46, 10, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(93, 46, 10, 0); } 100% { box-shadow: 0 0 0 0 rgba(93, 46, 10, 0); } }
        #map { height: 350px; width: 100%; border-radius: 4px; border: 1px solid #d1ccc0; }
        input[type=range] { -webkit-appearance: none; background: #d1ccc0; height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; background: var(--accent); border-radius: 50%; cursor: pointer; }
        .clean-text { margin-bottom: 0.75rem; }
    </style>
</head>
<body class="p-4">

    <header id="mainHeader" class="text-center py-8 fade-in transition-all duration-500">
        <h1 class="text-5xl md:text-7xl serif italic font-bold text-[#5d2e0a]">Life finds a Way</h1>
        <p class="text-[11px] md:text-sm tracking-[0.4em] text-stone-500 uppercase mt-4 font-bold">IL PRIMO SIMULATORE DI VITA</p>
    </header>

    <main id="stepSplash" class="flex-1 flex flex-col justify-center items-center w-full max-w-xl mx-auto fade-in">
        <button onclick="goToApi()" class="btn-main pulse-btn text-lg md:text-xl px-8 py-6 w-full max-w-sm rounded-lg">Preparati per la tua nuova vita</button>
    </main>

    <main id="stepApi" class="hidden flex-1 flex-col justify-center items-center w-full max-w-md mx-auto fade-in mb-20">
        <div class="card p-8 space-y-8 text-center w-full">
            <h2 class="serif text-3xl italic font-bold text-[#5d2e0a]">Inserisci la chiave API di Gemini</h2>
            <input type="password" id="apiKey" placeholder="AIza..." class="w-full border border-stone-300 p-4 rounded text-center focus:outline-none focus:border-[#5d2e0a] text-lg">
            <button onclick="validateApi()" id="btnApi" class="w-full btn-main text-sm py-4">Avvia</button>
            <p id="apiError" class="text-red-600 text-[10px] font-bold uppercase hidden"></p>
        </div>
    </main>

    <main id="stepMenu" class="hidden flex-1 w-full max-w-xl mx-auto fade-in">
        <div class="card p-8 space-y-4 mt-4">
            <h2 class="serif text-2xl italic font-bold text-center mb-6 border-b pb-4">Scegli la tua Genesi</h2>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="spawnType('random')" class="btn-main flex justify-center items-center gap-2"><span>🎲</span> Destino Casuale</button>
                <button onclick="spawnType('manual')" class="btn-main flex justify-center items-center gap-2"><span>🛠️</span> Plasmata da Te</button>
                <div class="border-t border-stone-200 pt-6 mt-4">
                    <label class="text-[10px] font-bold text-stone-500 uppercase mb-2 block text-center">🧠 Genesi Guidata (Scrivi chi vuoi essere)</label>
                    <textarea id="iaPrompt" placeholder="Es: Voglio essere un mercante veneziano del 1500 invischiato in debiti..." class="w-full border border-stone-300 p-3 text-sm rounded h-24 bg-stone-50 mb-3 focus:outline-none focus:border-[#5d2e0a]"></textarea>
                    <button onclick="spawnType('ai')" class="w-full btn-main bg-stone-800 hover:bg-stone-700">Incarna questo pensiero</button>
                </div>
            </div>
        </div>
    </main>

    <main id="stepManual" class="hidden flex-1 w-full max-w-xl mx-auto fade-in">
        <div class="card p-8 space-y-6 mt-4">
            <h2 class="serif text-2xl italic font-bold border-b pb-2">Dati della Stirpe</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] font-bold uppercase text-stone-500">📅 Anno Simulazione</label>
                    <input type="number" id="year" value="2020" class="w-full border border-stone-300 p-3 rounded">
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase text-stone-500">👤 Sesso</label>
                    <select id="gender" class="w-full border border-stone-300 p-3 rounded"><option>Maschio</option><option>Femmina</option></select>
                </div>
            </div>
            <div>
                <label class="text-[9px] font-bold uppercase text-stone-500">⏳ Età Iniziale</label>
                <input type="number" id="age" value="17" class="w-full border border-stone-300 p-3 rounded">
            </div>
            <div class="space-y-2 py-4">
                <div class="flex justify-between text-[10px] font-bold uppercase text-stone-500">
                    <span>💰 Ricchezza Famiglia</span>
                    <span id="wealthVal" class="text-xl text-[#5d2e0a] serif font-bold">5</span>
                </div>
                <input type="range" id="wealth" min="1" max="10" value="5" oninput="document.getElementById('wealthVal').innerText = this.value" class="w-full">
            </div>
            <button onclick="goToMap()" class="w-full btn-main">Scegli Luogo sulla Mappa</button>
        </div>
    </main>

    <main id="stepMap" class="hidden flex-1 w-full max-w-4xl mx-auto fade-in text-center">
        <h2 class="serif text-3xl italic font-bold mb-4">Traccia il tuo destino</h2>
        <div id="map" class="shadow-sm"></div>
        <button onclick="preSpawn('manual')" class="btn-main w-full py-5 mt-4">Genera Identità</button>
    </main>

    <div id="confirm" class="hidden fixed inset-0 z-50 bg-stone-100/98 flex items-center justify-center p-4 text-center">
        <div class="card max-w-md w-full p-8 space-y-6 border-2 border-[#5d2e0a]">
            <h2 class="serif italic font-bold text-3xl">Il Filo è Tessuto</h2>
            <div id="miniResoconto" class="serif text-xl space-y-1 border-y border-stone-200 py-6"></div>
            <div class="flex gap-3">
                <button onclick="acceptDestiny()" class="flex-1 btn-main">Accetta e Vivi</button>
                <button onclick="location.reload()" class="flex-1 border border-stone-300 text-[10px] uppercase font-bold hover:bg-stone-50 transition-colors">Rinnega Tutto</button>
            </div>
        </div>
    </div>

    <main id="game" class="hidden flex-1 w-full max-w-3xl mx-auto flex flex-col h-[85vh] fade-in">
        <header class="flex justify-between items-end border-b border-stone-300 pb-2 mb-4">
            <h2 class="serif italic font-bold text-2xl text-[#5d2e0a]">Le tue Cronache</h2>
            <div id="gameInfo" class="text-[10px] font-bold text-stone-500 uppercase tracking-widest text-right"></div>
        </header>
        <div id="log" class="flex-1 overflow-y-auto space-y-6 pr-2"></div>
        <footer class="mt-4 pt-4 border-t border-stone-300 bg-[var(--bg)]">
            <textarea id="action" class="w-full h-20 p-4 border border-stone-300 rounded text-sm mb-3 shadow-inner focus:outline-none focus:border-[#5d2e0a]" placeholder="Cosa decidi di fare ora?"></textarea>
            <div class="flex gap-2">
                <button onclick="playTurn(1)" class="flex-1 border border-stone-400 py-3 text-[9px] uppercase font-bold hover:bg-stone-100 transition-colors">1 Mese</button>
                <button onclick="playTurn(6)" class="flex-1 border border-stone-400 py-3 text-[9px] uppercase font-bold hover:bg-stone-100 transition-colors">6 Mesi</button>
                <button onclick="playTurn(12)" class="flex-1 btn-main">1 Anno</button>
            </div>
        </footer>
    </main>

    <script>
        let map, drawnItems, spawnCoords = null;
        let pData = { name: "", place: "", state: "", currentYear: 2020, currentAge: 17, wealth: 5, gender: "", type: "" };

        function toggleScreen(h, s) { 
            document.getElementById(h).classList.add('hidden'); 
            document.getElementById(s).classList.remove('hidden'); 
        }

        function goToApi() {
            toggleScreen('stepSplash', 'stepApi');
        }

        async function validateApi() {
            const key = document.getElementById('apiKey').value.trim();
            const err = document.getElementById('apiError');
            const btn = document.getElementById('btnApi');
            
            if(!key) { err.innerText = "Devi inserire la chiave per accedere."; err.classList.remove('hidden'); return; }
            
            err.classList.add('hidden');
            btn.innerText = "Verifica in corso...";
            btn.disabled = true;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                if(res.ok) {
                    toggleScreen('stepApi', 'stepMenu');
                } else {
                    err.innerText = "Chiave non valida. Controlla e riprova.";
                    err.classList.remove('hidden');
                }
            } catch(e) {
                err.innerText = "Errore di connessione a Google.";
                err.classList.remove('hidden');
            }
            btn.innerText = "Avvia";
            btn.disabled = false;
        }

        function spawnType(type) {
            pData.type = type;
            if(type === 'manual') toggleScreen('stepMenu', 'stepManual');
            else preSpawn(type);
        }

        function goToMap() { 
            toggleScreen('stepManual', 'stepMap'); 
            if (!map) {
                map = L.map('map').setView([41.9, 12.5], 3);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                drawnItems = new L.FeatureGroup();
                map.addLayer(drawnItems);
                new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polyline: false, circle: false, marker: true, polygon: true, rectangle: true } }).addTo(map);
                map.on(L.Draw.Event.CREATED, e => { 
                    drawnItems.clearLayers(); 
                    drawnItems.addLayer(e.layer); 
                    spawnCoords = (e.layer instanceof L.Marker) ? e.layer.getLatLng() : e.layer.getBounds().getCenter(); 
                });
            }
        }

        async function preSpawn(mode) {
            if (mode === 'manual' && !spawnCoords) return alert("Traccia un'area o metti un marker sulla mappa prima di generare!");
            const key = document.getElementById('apiKey').value;
            
            const jsonFormat = 'Rispondi SOLO con questo JSON esatto: {"name": "Nome", "place": "Città", "state": "Nazione", "currentYear": 1200, "gender": "Maschio/Femmina", "currentAge": 20, "wealth": 5}';
            let prompt = "";

            if(mode === 'random') {
                prompt = `Genera un personaggio casuale in un anno storico tra l'anno 1 e il 1800. ${jsonFormat}`;
            } else if (mode === 'ai') {
                prompt = `Genera un personaggio seguendo queste direttive: "${document.getElementById('iaPrompt').value}". ${jsonFormat}`;
            } else {
                // Geo-decoding robusto (Previene crash se si clicca in mezzo al mare)
                try {
                    const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${spawnCoords.lat}&lon=${spawnCoords.lng}&format=json&accept-language=it`).then(r => r.json());
                    pData.place = geo?.address?.city || geo?.address?.town || geo?.address?.village || geo?.address?.state || "Luogo Ignoto";
                    pData.state = geo?.address?.country || "Terra Incognita";
                } catch(err) {
                    pData.place = "Luogo remoto";
                    pData.state = "Mondo sconosciuto";
                }
                
                pData.currentYear = Number(document.getElementById('year').value) || 1000;
                pData.gender = document.getElementById('gender').value || "Maschio";
                pData.currentAge = Number(document.getElementById('age').value) || 0;
                pData.wealth = Number(document.getElementById('wealth').value) || 5;
                
                prompt = `Genera Nome e Cognome storicamente accurati per un ${pData.gender} a ${pData.place} nell'anno ${pData.currentYear}. Rispondi SOLO col nome.`;
            }

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });
                const data = await res.json();
                const rawText = data.candidates[0].content.parts[0].text;

                if(mode !== 'manual') {
                    const match = rawText.match(/\{[\s\S]*\}/);
                    if (match) {
                        const parsed = JSON.parse(match[0]);
                        pData.name = parsed.name || "Sconosciuto";
                        pData.place = parsed.place || "Ignoto";
                        pData.state = parsed.state || "Ignoto";
                        pData.currentYear = Number(parsed.currentYear || 1000);
                        pData.gender = parsed.gender || "Maschio";
                        pData.currentAge = Number(parsed.currentAge || 0);
                        pData.wealth = Number(parsed.wealth || 5);
                    } else { throw new Error("JSON non valido"); }
                } else { 
                    pData.name = rawText.replace(/[*#"']/g, '').trim(); 
                }

                document.getElementById('miniResoconto').innerHTML = `
                    <p class="font-bold text-3xl mb-1">${pData.name}</p>
                    <p class="text-stone-600 text-sm italic">${pData.place}, ${pData.state}</p>
                    <p class="text-[11px] uppercase tracking-widest mt-6 font-bold text-stone-500">
                        Anno: ${pData.currentYear} <br> Età: ${pData.currentAge} <br> Ricchezza: ${pData.wealth}/10
                    </p>`;
                
                if(mode === 'manual') toggleScreen('stepMap', 'confirm');
                else toggleScreen('stepMenu', 'confirm');

            } catch (e) {
                alert("Si è verificato un errore nella generazione. Riprova.");
            }
        }

        async function acceptDestiny() {
            toggleScreen('confirm', 'game');
            // Riduciamo la dimensione dell'header globale per dare spazio alla chat
            document.getElementById('mainHeader').classList.add('scale-75', '-mt-8', 'mb-0', 'py-2');
            await playTurn(0, true);
        }

        async function playTurn(m, isFirst = false) {
            const key = document.getElementById('apiKey').value;
            const log = document.getElementById('log');
            const action = document.getElementById('action').value;
            
            const loading = document.createElement('div');
            loading.innerText = "Sincronizzazione cronache...";
            loading.className = "serif italic text-stone-500 py-2 animate-pulse font-bold text-center";
            log.appendChild(loading);
            log.scrollTop = log.scrollHeight;

            let prompt = "";
            if (isFirst) {
                prompt = `Sei un Master Storico. Genera il RESOCONTO INIZIALE COMPLETO per: ${pData.name}, ${pData.gender}, a ${pData.place}, ${pData.state}.
                Siamo nell'anno esatto ${Math.floor(pData.currentYear)}. Il personaggio ha ESATTAMENTE ${Math.floor(pData.currentAge)} anni. Ricchezza: ${pData.wealth}/10. 
                Struttura l'output in modo leggibile e organizzato con queste sezioni usando queste emoji (NON USARE ASTERISCHI O HASHTAG IN NESSUN CASO):
                🌍 Contesto storico e problemi del momento:
                👨‍👩‍👦 Genitori o Tutori (nomi, lavori, vivi o morti):
                🤝 Alleati e Conoscenti:
                🏰 Possedimenti attuali:
                ⚖️ Ruolo Sociale:
                ⚔️ Nemici o Pericoli:
                💍 Situazione Sentimentale:
                Aggiungi in fondo: [IMG: keywords storiche in inglese].`;
            } else {
                prompt = `Master Storico. Protagonista: ${pData.name}, ${pData.gender}. Anno: ${Math.floor(pData.currentYear)}. Età attuale: ${Math.floor(pData.currentAge)}. Ricchezza: ${pData.wealth}/10. 
                Azione: "${action}".
                Scrivi in modo diretto e realistico. MASSIMO 4 frasi totali. Includi relazioni sociali/amorose se sensato. 
                DIVIETO ASSOLUTO DI USARE MARKDOWN (niente asterischi o hashtag). 
                Aggiungi in fondo: [IMG: keywords in inglese].`;
            }

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({contents:[{parts:[{text: prompt}]}]})
                });
                const data = await res.json();
                loading.remove();

                let text = data.candidates[0].content.parts[0].text.replace(/[*#]/g, ''); 
                
                const imgMatch = text.match(/\[IMG: (.*?)\]/i);
                let imgTag = "";
                if(imgMatch) {
                    imgTag = `<img src="https://source.unsplash.com/800x350/?${encodeURIComponent(imgMatch[1].trim())}" class="w-full h-48 object-cover rounded mb-4 border border-stone-200 shadow-sm" alt="Scena storica">`;
                    text = text.replace(imgMatch[0], "");
                }

                const div = document.createElement('div');
                div.className = "serif p-6 bg-white border border-stone-200 rounded-lg shadow-sm fade-in";
                
                const formattedText = text.split('\n').filter(line => line.trim() !== '').map(line => `<p class="clean-text">${line.trim()}</p>`).join('');

                div.innerHTML = `${imgTag}<div class="text-lg leading-relaxed text-stone-800">${formattedText}</div>`;
                log.appendChild(div);
                
                if(!isFirst) {
                    pData.currentAge += (m / 12);
                    pData.currentYear += (m / 12);
                }
                
                document.getElementById('gameInfo').innerText = `${pData.name} | Anno ${Math.floor(pData.currentYear)} | Età: ${Math.floor(pData.currentAge)}`;
                document.getElementById('action').value = "";
                log.scrollTop = log.scrollHeight;
            } catch(e) { 
                loading.innerText = "Errore di connessione. Le cronache sono sbiadite."; 
            }
        }
    </script>
</body>
</html>
