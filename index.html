<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life finds a Way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400;700&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .historical-font { font-family: 'Playfair Display', serif; }
        .typewriter { font-family: 'Courier Prime', monospace; }
        input, textarea, select { background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; outline: none; transition: 0.3s; width: 100%; }
        input:focus, textarea:focus, select:focus { border-color: #fff; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 1s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .header-img { width: 100%; height: 250px; object-fit: cover; filter: grayscale(1) contrast(1.2) brightness(0.7); border-bottom: 1px solid #333; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="min-h-screen">

    <div id="setup" class="max-w-xl mx-auto p-6 space-y-6 pt-10 pb-20">
        <h1 class="text-5xl italic text-center historical-font mb-4">Life finds a Way</h1>
        <img id="previewImg" src="https://images.unsplash.com/photo-1461360228754-6e81c478c882?q=80&w=1000&auto=format&fit=crop" class="header-img rounded-lg shadow-2xl mb-8">
        
        <div class="space-y-6">
            <div class="flex flex-col">
                <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1">Google API Key (AIza...)</label>
                <input type="password" id="apiKey" placeholder="Incolla qui la tua chiave">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1">Anno di inizio</label>
                    <input type="number" id="year" value="1000">
                </div>
                <div>
                    <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1">Città / Regione</label>
                    <input type="text" id="city" placeholder="Roma, Londra...">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1">Sesso</label>
                    <select id="gender">
                        <option value="Maschio">Maschio</option>
                        <option value="Femmina">Femmina</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1">Età iniziale</label>
                    <input type="number" id="age" value="0">
                </div>
            </div>

            <div class="flex flex-col">
                <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1">Ceto Sociale: <span id="wVal">5</span>/10</label>
                <input type="range" id="wealth" min="1" max="10" value="5" oninput="document.getElementById('wVal').innerText=this.value">
            </div>

            <button onclick="start()" class="w-full bg-white text-black font-bold py-5 uppercase text-[11px] tracking-[0.3em] hover:bg-gray-200 transition-all">Genera Destino</button>
        </div>
    </div>

    <div id="game" class="hidden fixed inset-0 flex flex-col bg-black">
        <header class="border-b border-zinc-900 p-4 flex justify-between items-center bg-black z-10">
            <h2 class="historical-font italic text-xl">Life finds a Way</h2>
            <div id="infoLabel" class="text-[9px] text-gray-500 uppercase tracking-widest font-bold"></div>
        </header>
        <div id="log" class="flex-1 overflow-y-auto p-6 space-y-12 max-w-3xl mx-auto w-full pt-10"></div>
        <footer class="p-6 border-t border-zinc-900 bg-black">
            <div class="max-w-3xl mx-auto">
                <textarea id="action" class="w-full h-24 mb-4 p-4 text-sm bg-zinc
