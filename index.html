<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life finds a Way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .historical-font { font-family: 'Playfair Display', serif; }
        input, textarea, select { background: #111; border: 1px solid #333; color: #fff; padding: 12px; width: 100%; outline: none; }
        input:focus { border-color: #fff; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen p-4">

    <div id="setup" class="max-w-xl mx-auto space-y-6 pt-10">
        <h1 class="text-4xl text-center historical-font italic">Life finds a Way</h1>
        
        <div class="space-y-4">
            <input type="password" id="apiKey" placeholder="Incolla API Key (AIza...)">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="year" value="1000" placeholder="Anno">
                <input type="text" id="city" placeholder="Città (es. Roma)">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select id="gender">
                    <option value="Maschio">Maschio</option>
                    <option value="Femmina">Femmina</option>
                </select>
                <input type="number" id="age" value="0" placeholder="Età">
            </div>

            <div class="text-center">
                <label class="text-xs text-gray-500 uppercase">Ricchezza (1-10)</label>
                <input type="range" id="wealth" min="1" max="10" value="5" class="mt-2">
            </div>

            <button onclick="startGame()" class="w-full bg-white text-black font-bold py-4 uppercase text-xs tracking-widest">Genera Destino</button>
        </div>
    </div>

    <div id="game" class="hidden fixed inset-0 flex flex-col bg-black overflow-hidden">
        <header class="p-4 border-b border-zinc-900 flex justify-between">
            <span class="historical-font italic">Life finds a Way</span>
            <span id="info" class="text-[10px] text-gray-500 uppercase"></span>
        </header>
        <div id="log" class="flex-1 overflow-y-auto p-6 space-y-8 max-w-2xl mx-auto w-full"></div>
        <footer class="p-6 border-t border-zinc-900">
            <textarea id="action" class="w-full h-20 mb-4 p-2 text-sm" placeholder="Cosa fai?"></textarea>
            <button onclick="playTurn(12)" class="bg-white text-black px-8 py-2 text-xs font-bold uppercase">Avanza 1 Anno</button>
        </footer>
    </div>

    <script>
        let gameHistory = [];

        function startGame() {
            const key = document.getElementById('apiKey').value.trim();
            if (!key) { alert("Manca la chiave API!"); return; }
            
            // Passaggio schermata
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').classList.remove('hidden');
            
            const city = document.getElementById('city').value || "un luogo ignoto";
            const year = document.getElementById('year').value;
            document.getElementById('info').innerText = city + " | " + year;
            
            playTurn(0); // Primo turno automatico
        }

        async function playTurn(months) {
            const key = document.getElementById('apiKey').value.trim();
            const actionField = document.getElementById('action');
            const log = document.getElementById('log');
            
            let currentAction = actionField.value;
            if (gameHistory.length === 0 && !currentAction) {
                currentAction = "Inizia la mia storia, genera prologo.";
            }

            // Messaggio di attesa
            const loading = document.createElement('p');
            loading.innerText = "Scrivendo il destino...";
            loading.className = "text-gray-500 italic text-xs";
            log.appendChild(loading);

            const year = document.getElementById('year').value;
            const city = document.getElementById('city').value || "ignoto";
            const gender = document.getElementById('gender').value;
            const age = document.getElementById('age').value;
            const wealth = document.getElementById('wealth').value;

            const prompt = `GM di 'Life finds a Way'. 
            Dati: ${gender}, ${age} anni, Anno ${year}, ${city}, Ricchezza ${wealth}/10. 
            Azione: ${currentAction}. Mesi: ${months}.
            Rispondi in italiano con un prologo dettagliato se è l'inizio, o l'esito dell'azione. 
            Includi sempre un evento storico reale. Alla fine del primo turno scrivi '---DESCRIZIONE VISIVA IA---' e un prompt per immagine in inglese.`;

            try {
                const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiText = data.candidates[0].content.parts[0].text;
                loading.remove();

                const entry = document.createElement('div');
                entry.className = "border-l border-zinc-800 pl-4 py-2 fade-in";
                entry.innerHTML = `<p class='text-sm leading-relaxed'>${aiText.replace(/\n/g, '<br>')}</p>`;
                log.appendChild(entry);

                actionField.value = "";
                gameHistory.push({ action: currentAction, response: aiText });
                log.scrollTop = log.scrollHeight;

            } catch (err) {
                loading.innerText = "ERRORE: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
