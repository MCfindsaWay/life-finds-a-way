<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life finds a Way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .historical-font { font-family: 'Playfair Display', serif; }
        input, textarea, select { background: #111; border: 1px solid #333; color: #fff; padding: 12px; width: 100%; outline: none; }
        input:focus { border-color: #fff; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input[type=range] { -webkit-appearance: none; background: #222; height: 4px; border: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; background: #fff; cursor: pointer; border-radius: 50%; }
    </style>
</head>
<body class="min-h-screen">

    <div id="setup" class="max-w-xl mx-auto space-y-6 pt-10 px-4 pb-20">
        <h1 class="text-4xl text-center historical-font italic">Life finds a Way</h1>
        <p class="text-[10px] text-center tracking-[0.3em] text-zinc-500 uppercase">Historical Life Simulator</p>
        
        <div class="space-y-4 pt-6 border-t border-zinc-900">
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500 mb-1">Google API Key</label>
                <input type="password" id="apiKey" placeholder="Incolla AIza...">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="year" value="1000" placeholder="Anno">
                <input type="text" id="city" placeholder="Città">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select id="gender">
                    <option value="Maschio">Maschio</option>
                    <option value="Femmina">Femmina</option>
                </select>
                <input type="number" id="age" value="0" placeholder="Età">
            </div>

            <div class="text-center py-4">
                <label class="text-[10px] text-gray-500 uppercase tracking-widest">Ricchezza: <span id="wealthNum" class="text-white font-bold text-lg">5</span></label>
                <input type="range" id="wealth" min="1" max="10" value="5" oninput="document.getElementById('wealthNum').innerText = this.value" class="mt-2">
            </div>

            <button onclick="startGame()" class="w-full bg-white text-black font-bold py-4 uppercase text-xs tracking-widest hover:bg-zinc-200">Genera Destino</button>
        </div>
    </div>

    <div id="game" class="hidden fixed inset-0 flex flex-col bg-black overflow-hidden">
        <header class="p-4 border-b border-zinc-900 flex justify-between items-center bg-black z-10">
            <span class="historical-font italic text-xl">Life finds a Way</span>
            <span id="info" class="text-[10px] text-zinc-500 uppercase tracking-widest"></span>
        </header>
        <div id="log" class="flex-1 overflow-y-auto p-6 space-y-10 max-w-2xl mx-auto w-full"></div>
        <footer class="p-6 border-t border-zinc-900 bg-black">
            <div class="max-w-2xl mx-auto text-center">
                <textarea id="action" class="w-full h-24 mb-4 p-4 text-sm bg-zinc-950 border border-zinc-900 text-zinc-300" placeholder="Qual è la tua prossima mossa?"></textarea>
                <button onclick="playTurn(12)" class="bg-white text-black px-10 py-3 text-xs font-bold uppercase tracking-widest">Avanza 1 Anno</button>
            </div>
        </footer>
    </div>

    <script>
        let gameHistory = [];

        function startGame() {
            const key = document.getElementById('apiKey').value.trim();
            if (!key) { alert("Manca l'API Key!"); return; }
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').classList.remove('hidden');
            const city = document.getElementById('city').value || "un luogo ignoto";
            const year = document.getElementById('year').value;
            document.getElementById('info').innerText = city + " | ANNO " + year;
            playTurn(0);
        }

        async function playTurn(months) {
            const key = document.getElementById('apiKey').value.trim();
            const actionField = document.getElementById('action');
            const log = document.getElementById('log');
            let currentAction = actionField.value;
            
            if (gameHistory.length === 0 && !currentAction) {
                currentAction = "Genera un prologo dettagliato della mia vita.";
            }

            const loading = document.createElement('p');
            loading.innerText = "Interrogando le cronache...";
            loading.className = "text-zinc-600 italic text-[10px] uppercase tracking-widest animate-pulse";
            log.appendChild(loading);
            log.scrollTop = log.scrollHeight;

            // MODELLO 8B: MASSIMA COMPATIBILITÀ
            const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=" + key;

            const prompt = `Sei il GM di 'Life finds a Way'. PG: ${document.getElementById('gender').value}, ${document.getElementById('age').value} anni. CONTESTO: Anno ${document.getElementById('year').value}, ${document.getElementById('city').value}, Ceto ${document.getElementById('wealth').value}/10. AZIONE: "${currentAction}". STORIA: ${JSON.stringify(gameHistory.slice(-2))}. Rispondi in italiano narrativo storico. Turno 0: Prologo totale. Fine Turno 0: Aggiungi '---DESCRIZIONE VISIVA IA---' e prompt immagine inglese B&W.`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error ? data.error.message : "Errore");

                const aiText = data.candidates[0].content.parts[0].text;
                loading.remove();

                const entry = document.createElement('div');
                entry.className = "fade-in border-l border-zinc-800 pl-6 py-2";
                entry.innerHTML = `<p class='text-sm leading-relaxed text-zinc-300'>${aiText.replace(/\n/g, '<br>')}</p>`;
                
                log.appendChild(entry);
                actionField.value = "";
                gameHistory.push({ action: currentAction, response: aiText });
                log.scrollTop = log.scrollHeight;
            } catch (err) {
                loading.innerText = "ERRORE: " + err.message;
                loading.style.color = "red";
                console.error(err);
            }
        }
    </script>
</body>
</html>
